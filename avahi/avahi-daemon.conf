# TimeNest avahi-daemon.conf
#
# Conservative defaults suitable for a home LAN. The daemon only needs to
# advertise, not browse, so disable publishing of addresses we do not own
# and disable workstation advertisement (that is macOS's job).

[server]
use-ipv4=yes
use-ipv6=yes
allow-interfaces=
deny-interfaces=docker0,docker_gwbridge,veth*,br-*
ratelimit-interval-usec=1000000
ratelimit-burst=1000
cache-entries-max=4096
clients-max=4096
enable-dbus=no

[wide-area]
enable-wide-area=no

[publish]
publish-addresses=yes
publish-hinfo=no
publish-workstation=no
publish-domain=yes
publish-aaaa-on-ipv4=no
publish-a-on-ipv6=no

[reflector]
enable-reflector=no

[rlimits]
rlimit-core=0
rlimit-data=8388608
rlimit-fsize=0
rlimit-nofile=768
rlimit-stack=8388608
rlimit-nproc=3
