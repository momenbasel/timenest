<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TimeNest - Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body class="min-h-screen bg-gradient-to-br from-[#05070d] via-[#0c0f17] to-[#0b1a2b] text-ink-100 flex items-center justify-center font-sans">

<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <svg class="mx-auto h-12 w-12 text-sky-400" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="16" cy="16" r="12"></circle>
            <path d="M16 8 v8 l5 3"></path>
        </svg>
        <h1 class="mt-4 text-2xl font-semibold tracking-tight text-white">TimeNest</h1>
        <p class="text-sm text-slate-400 mt-1">Network Time Machine for every Mac on your LAN</p>
    </div>

    <form method="post" action="/login"
          class="bg-slate-900/70 border border-slate-800 rounded-xl p-6 space-y-4 shadow-2xl backdrop-blur">
        {% if error %}
        <div class="rounded-md bg-red-500/10 border border-red-500/30 px-3 py-2 text-sm text-red-300">
            {{ error }}
        </div>
        {% endif %}
        <label class="block">
            <span class="text-xs uppercase tracking-wider text-slate-400">Username</span>
            <input name="username" type="text" required autofocus autocomplete="username"
                   class="mt-1 block w-full rounded-md border-slate-700 bg-slate-800/60 text-slate-100 px-3 py-2 focus:border-sky-500 focus:ring-sky-500 focus:outline-none text-sm">
        </label>
        <label class="block">
            <span class="text-xs uppercase tracking-wider text-slate-400">Password</span>
            <input name="password" type="password" required autocomplete="current-password"
                   class="mt-1 block w-full rounded-md border-slate-700 bg-slate-800/60 text-slate-100 px-3 py-2 focus:border-sky-500 focus:ring-sky-500 focus:outline-none text-sm">
        </label>
        <button type="submit"
                class="w-full rounded-md bg-sky-500 hover:bg-sky-400 text-slate-900 font-semibold py-2 transition">
            Sign in
        </button>
        <p class="text-xs text-slate-500 text-center">
            Forgot your password? Edit <code class="text-slate-400">.env</code> and
            restart the stack.
        </p>
    </form>

    <p class="text-center text-xs text-slate-600 mt-6">
        github.com/momenbasel/timenest
    </p>
</div>

</body>
</html>
